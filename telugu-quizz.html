<!-- ================= TOP NAVIGATION ================= -->
<style>
.edu-top-nav {
  background: transparent;
  padding: 10px 0;
  margin-bottom: 20px;
  text-align: center;
  width: 100%;
}
h2.nav-container {
  margin: 0;
  font-size: 17px; 
  font-family: 'Segoe UI', Arial, sans-serif;
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 15px;
}
h2.nav-container a {
  text-decoration: none;
  color: #000000 !important; 
  font-weight: 800; 
}
h2.nav-container a:hover {
  color: #ff6600 !important;
  text-decoration: underline;
}
.divider { color:#333; }
@media (max-width:600px){
  h2.nav-container{font-size:15px; gap:10px;}
  .divider{display:none;}
}
</style>

<!-- ================= QUIZ WRAPPER ================= -->
<div id="quiz-wrapper" style="max-width:600px;margin:auto;font-family:'Segoe UI',Arial;padding:25px;border:2px solid #333;border-radius:12px;background:#ffffff;color:#000;">

  <!-- START SECTION -->
  <div id="startSection" style="text-align:center;">
    <h3 style="margin-bottom:15px;">📘 Quiz Instructions</h3>
    <ul style="text-align:left;line-height:1.8;font-size:15px;">
      <li>⏳ Each question has 20 seconds time limit.</li>
      <li>✅ Correct answer gives 1 mark.</li>
      <li>❌ Wrong answer gives 0 mark.</li>
      <li>📖 Explanation will be shown after each answer.</li>
      <li>🏆 Final score will be displayed at the end.</li>
    </ul>
    <button onclick="startQuiz()" style="margin-top:20px;padding:12px 30px;background:#ff6600;color:#fff;border:none;border-radius:6px;font-weight:bold;cursor:pointer;">
      ▶ Start Quiz
    </button>
  </div>

  <!-- QUIZ AREA -->
  <div id="quiz" style="display:none;"></div>
  <div id="result" style="text-align:center;font-weight:bold;margin-top:20px;"></div>

  <div style="text-align:center;margin-top:20px;">
    <button id="nextBtn" onclick="nextQuestion()" style="display:none;padding:10px 20px;background:#28a745;color:#fff;border:none;border-radius:5px;cursor:pointer;">Next ➔</button>
    <button id="restartBtn" onclick="restartQuiz()" style="display:none;padding:10px 20px;background:#004a99;color:#fff;border:none;border-radius:5px;cursor:pointer;">Restart ↻</button>
  </div>

  <!-- AUDIO -->
  <audio id="correctSound" src="https://learnedualogy.github.io/Learn-Edualogy/sound-correct.mp3"></audio>
  <audio id="wrongSound" src="https://learnedualogy.github.io/Learn-Edualogy/sound-wrong.mp3"></audio>
</div>

<!-- ================= SCRIPT ================= -->
<script>
const questions = [

answers: ["జాన్ మార్షల్", "అలెగ్జాండర్ కన్నింగ్‌హామ్", "మార్టిమర్ వీలర్", "జేమ్స్ ప్రిన్సెప్"],

answers: ["చతురస్రం", "వృత్తం", "త్రిభుజాకారం", "దీర్ఘచతురస్రం"],
correct: 2

},
{
            question: "పాత రాతియుగం (Paleolithic) నాటి గీత చిత్రాలకు ప్రసిద్ధి చెందిన 'భీమ్ బెట్కా' గుహలు ఏ రాష్ట్రంలో ఉన్నాయి?",
            answers: ["ఉత్తరప్రదేశ్", "రాజస్థాన్", "మధ్యప్రదేశ్", "గుజరాత్"],
            correct: 2
        },
      
      {

            answers: ["పాత రాతియుగం", "మధ్య రాతియుగం", "కొత్త రాతియుగం", "ఇనుప యుగం"],

        },
      
      {

            answers: ["మెసోలిథిక్", "పాలియోలిథిక్", "నియోలిథిక్", "చాల్కోలిథిక్"],
            correct: 0
        },
      
      {

            answers: ["1919", "1921", "1924", "1930"],
            correct: 1
        },
      
      {
            question: "హరప్పా నగరం ఏ నది ఒడ్డున ఉంది?",
            answers: ["సింధు", "సట్లెజ్", "ఘగ్గర్", "రావి"],
            correct: 3
        },
      
      {

            answers: ["హరప్పా", "కాళీబంగన్", "మొహంజొదారో", "లోథల్"],

            answers: ["ధోలవీర", "లోథల్", "సుర్కోటడ", "చన్హుదారో"],

        },
      
      {
            question: "సింధు ప్రజలు ఆరాధించిన ముఖ్యమైన దైవం ఎవరు?",
            answers: ["ఇంద్రుడు", "విష్ణువు", "పశుపతి", "వరుణుడు"],
            correct: 2
        },
      
      {
            question: "సింధు నాగరికతలో 'మహా స్నానవాటిక' (Great Bath) ఎక్కడ బయల్పడింది?",
            answers: ["హరప్పా", "మొహంజొదారో", "రాఖీగఢీ", "రోపార్"],

      {

      {

            answers: ["బ్రాహ్మీ లిపి", "దేవనాగరి", "ఖరోష్ఠి లిపి", "బొమ్మల లిపి"],
            correct: 3

      {
            question: "నల్లని గాజులు అని అర్థం వచ్చే సింధు స్థావరం ఏది?",
            answers: ["బన్వాలీ", "కాళీబంగన్", "లోథల్", "ధోలవీర"],
            correct: 1
        },
      
      {

            answers: ["మొహంజొదారో", "హరప్పా", "ధోలవీర", "లోథల్"],
            correct: 2
        },
      
      {
            question: "సింధు నాగరికత ఏ యుగానికి చెందినది?",
            answers: ["కాంస్య యుగం", "ఇనుప యుగం", "పాత రాతియుగం", "ఏదీ కాదు"],
            correct: 0
        },
      
      {
            question: "సింధు ప్రజలు వాడిన కొలతలు ఏ సంఖ్య గుణిజాలుగా ఉండేవి?",
            answers: ["10", "12", "16", "20"],
            correct: 2
        },
      
      {
            question: "హరప్పా నాగరికత అంతానికి గల ప్రధాన కారణం 'వరదలు' అని పేర్కొన్నది ఎవరు?",
            answers: ["మార్టిమర్ వీలర్", "రాబర్ట్ రైక్స్", "ఎస్.ఆర్. రావు", "బి.కె. థాపర్"],
            correct: 1
        },
      
      {
            question: "సింధు ముద్రికలు (Seals) ఎక్కువగా దేనితో చేయబడ్డాయి?",
            answers: ["స్టీయటైట్", "టెర్రాకోటా", "బంగారం", "ఇనుము"],
            correct: 0

      {

            answers: ["మెసొపొటేమియా", "ఈజిప్ట్", "సింధు లోయ నాగరికత", "చైనా"],
            correct: 2
        },
      
      {
            question: "హరప్పా ప్రజలు ఏ దేశంతో విదేశీ వాణిజ్యం నిర్వహించేవారు?",
            answers: ["మెసొపొటేమియా", "రోమ్", "గ్రీస్", "శ్రీలంక"],
            correct: 0
        },
      
      {
            question: "ఎముకలతో చేసిన పనిముట్లు అత్యధికంగా దొరికిన నియోలిథిక్ ప్రాంతం ఏది?",
            answers: ["బుర్జాహోమ్", "చిరాండ్", "కోల్దివా", "బ్రహ్మగిరి"],
            correct: 1
        },
      
      {
            question: "అగ్ని గుండాలు (Fire Altars) ఏ నగరంలో బయల్పడ్డాయి?",
            answers: ["మొహంజొదారో", "హరప్పా", "కాళీబంగన్", "లోథల్"],
            correct: 2
        },
      
      {
            question: "సింధు నాగరికత విస్తీర్ణం ఏ ఆకారంలో ఉండేది?",
            answers: ["చతురస్రం", "వృత్తం", "త్రిభుజాకారం", "దీర్ఘచతురస్రం"],
            correct: 2
        }
];

let currentQuestion = 0;
let correctAnswers = 0;
let wrongAnswers = 0;
let timerInterval;

function startQuiz(){
document.getElementById("startSection").style.display="none";
document.getElementById("quiz").style.display="block";
showQuestion();
}

function showQuestion(){
clearInterval(timerInterval);
document.getElementById("nextBtn").style.display="none";

const q = questions[currentQuestion];
document.getElementById("quiz").innerHTML = `
<div style="font-size:22px;color:red;font-weight:bold;text-align:center;" id="timer">20</div>
<div style="font-size:18px;font-weight:bold;margin:15px 0;text-align:center;color:#ff6600;">
${currentQuestion+1}. ${q.question}
</div>
<div>
${q.answers.map((a,i)=>`
<label onclick="selectAnswer(${i})" id="opt${i}" 
style="display:block;background:#fff;padding:12px;margin-bottom:10px;border:2px solid #000;border-radius:6px;cursor:pointer;font-weight:600;">
${a}
</label>`).join("")}
</div>
<div id="explanationBox" style="margin-top:15px;"></div>
`;

startTimer(20);
}

function startTimer(seconds){
let timeLeft = seconds;
const timerDiv = document.getElementById("timer");
timerInterval = setInterval(()=>{
timeLeft--;
timerDiv.textContent = timeLeft;
if(timeLeft <= 0){
clearInterval(timerInterval);
selectAnswer(-1);
}
},1000);
}

function selectAnswer(selected){
clearInterval(timerInterval);
const q = questions[currentQuestion];

q.answers.forEach((_,i)=>{
const label = document.getElementById("opt"+i);
label.style.pointerEvents="none";
if(i===q.correct) label.style.background="#d4edda";
if(i===selected && selected!==q.correct) label.style.background="#f8d7da";
});

if(selected===q.correct){
correctAnswers++;
document.getElementById("correctSound").play();
}else{
wrongAnswers++;
document.getElementById("wrongSound").play();
}

document.getElementById("explanationBox").innerHTML = `
<div style="background:#f8f9fa;padding:12px;border-left:4px solid #ff6600;border-radius:6px;">
<b>Explanation:</b> ${q.explanation}
</div>
`;

document.getElementById("nextBtn").style.display="inline-block";
}

function nextQuestion(){
currentQuestion++;
if(currentQuestion < questions.length){
showQuestion();
}else{
showResult();
}
}

function showResult(){
document.getElementById("quiz").innerHTML="";
document.getElementById("nextBtn").style.display="none";
document.getElementById("result").innerHTML=`
<h3>🎉 Quiz Completed!</h3>
<p>Correct Answers: ${correctAnswers}</p>
<p>Wrong Answers: ${wrongAnswers}</p>
<p>Total Score: ${correctAnswers}/${questions.length}</p>
`;
document.getElementById("restartBtn").style.display="inline-block";
}

function restartQuiz(){
currentQuestion=0;
correctAnswers=0;
wrongAnswers=0;
document.getElementById("result").innerHTML="";
document.getElementById("restartBtn").style.display="none";
document.getElementById("startSection").style.display="block";
document.getElementById("quiz").style.display="none";
}
</script>
